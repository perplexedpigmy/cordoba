name: CI 

on:
  push:
    branches:
      - '**' # Trigger on all branches except main (due to branch protection)
  pull_request:
    branches:
      - main # Trigger on PRs targeting main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install GCC 14
      uses: egor-tensin/setup-gcc@v1
      with:
        gcc-version: 14

    - name: Configure and Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -S main
        cmake --build build
    
    - name: unitary test
      run: |
        ./build/gd/crud

    - name: stress test
      run: |
        ./build/gd/greens
